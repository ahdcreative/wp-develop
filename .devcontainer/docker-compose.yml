version: '3.6'

services:
  app:
    image: wordpress@sha256:2dcb414af724831f18089bd7943d957ceb6d3b09d00d271c2b189cea9740d321
    restart: always
    ports:
      - 8080:80
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ahduser
      WORDPRESS_DB_PASSWORD: ahdpass
      WORDPRESS_DB_NAME: ahdpressdev
    volumes:
      - ../..:/workspaces:cached

  db:
    image: mariadb@sha256:4d5a0e687d469b1a1e08ea8829f46ef1d966d9e0a3a8f3613fcf61e933161c27
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: ahdcreativedev
      MYSQL_PASSWORD: ahdcreativepass
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - db:/var/lib/mysql


volumes:
  db:
