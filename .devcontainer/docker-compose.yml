version: '3.6'

services:
  app:
    image: wordpress@sha256:8ae66efb09a2cc4f1ce44414c52b0ce4198c1f8ed338a6f51910bc09cd7d8bbb
    restart: always
    ports:
      - 8080:80
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ahduser
      WORDPRESS_DB_PASSWORD: ahdpass
      WORDPRESS_DB_NAME: ahdpressdev
    volumes:
      - ../..:/workspaces:cached

  db:
    image: mariadb@sha256:b5e508abc5d889425e90212541e30d29279b7ed34dd74bab5bb715b2f2aeeb7b
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: ahdcreativedev
      MYSQL_PASSWORD: ahdcreativepass
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - db:/var/lib/mysql


volumes:
  db:
